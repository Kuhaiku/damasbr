<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dama Brasileira Pro</title>
    <style>
        :root {
            --bg-dark: #121212; --panel-bg: #1e1e1e;
            --board-light: #e6c280; --board-dark: #6e4420; 
            --highlight: rgba(76, 175, 80, 0.8);
            --p1-color: #f5f5f5; --p2-color: #2b2b2b;
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;}
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.3s;}
        .hidden { display: none !important; }
        .modal { background: var(--panel-bg); padding: 30px; border-radius: 12px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333;}
        .modal h2 { margin-top: 0; color: #fff; }
        .modal input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; outline: none;}
        .modal input:focus { border-color: #4CAF50; }
        .btn { width: 100%; padding: 12px; border-radius: 6px; border: none; background: #4CAF50; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 10px;}
        .btn:hover { background: #45a049; }
        .btn.secondary { background: #444; border: 1px solid #666; margin-top: 10px; font-size: 14px; padding: 8px;}
        .btn.secondary:hover { background: #555; }
        
        #mainLayout { display: flex; gap: 20px; max-width: 1200px; width: 100%; justify-content: center; padding: 20px; box-sizing: border-box; }
        
        .side-panel { background: var(--panel-bg); border-radius: 8px; border: 2px solid #333; width: 260px; display: flex; flex-direction: column; overflow: hidden; height: 500px; }
        .panel-header { background: #2c2c2c; padding: 12px; font-weight: bold; text-align: center; border-bottom: 2px solid #333; font-size: 14px; letter-spacing: 1px;}
        .panel-content { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Chat Styles */
        .chat-msg { background: #2a2a2a; padding: 8px 10px; border-radius: 6px; line-height: 1.4;}
        .chat-msg.system { background: transparent; color: #aaa; font-style: italic; text-align: center; font-size: 12px; }
        .chat-msg b { color: #4CAF50; }
        #chatInputContainer { display: flex; border-top: 2px solid #333; }
        #chatInput { border: none; flex: 1; padding: 12px; background: #111; color: white; outline: none; }
        #chatBtn { background: #4CAF50; border: none; color: white; padding: 0 15px; cursor: pointer; font-weight: bold;}
        
        /* History Styles */
        .history-move { background: #2a2a2a; padding: 8px 10px; border-radius: 6px; display: flex; justify-content: space-between;}
        .history-move span:last-child { color: #ff9800; font-weight: bold; }

        #gameUI { display: flex; flex-direction: column; align-items: center; }
        
        .info-panel { display: flex; justify-content: space-between; width: 100%; margin-bottom: 10px; gap: 10px;}
        .player-card { background: var(--panel-bg); padding: 10px; border-radius: 8px; flex: 1; text-align: center; border: 2px solid #333; transition: 0.3s; position: relative;}
        .active-turn { border-color: #4CAF50; background: #1a2e1e; }
        
        .score-badge { position: absolute; top: -10px; right: -10px; background: #ff9800; color: #000; font-weight: bold; min-width: 24px; height: 24px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); padding: 0 6px; box-sizing: border-box; }
        
        #myRole { text-align: center; margin-bottom: 10px; font-weight: 500; color: #aaa; font-size: 14px; width: 100%;}
        
        /* Coordinate Board Layout */
        .board-layout { display: grid; grid-template-columns: 25px 360px; grid-template-rows: 360px 25px; gap: 4px; background: #1e1e1e; padding: 15px; border-radius: 8px; border: 2px solid #333;}
        .col-labels { grid-column: 2; grid-row: 2; display: flex; }
        .col-labels div { flex: 1; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #888; font-size: 13px;}
        .row-labels { grid-column: 1; grid-row: 1; display: flex; flex-direction: column; }
        .row-labels div { flex: 1; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #888; font-size: 13px;}
        
        #board-wrapper { grid-column: 2; grid-row: 1; padding: 0; background: #2c1a0e; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        #board { display: grid; grid-template-columns: repeat(8, 45px); grid-template-rows: repeat(8, 45px); width: 360px; height: 360px; border: 2px solid #1a0f08; box-sizing: border-box;}
        
        .cell { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; position: relative; }
        .light { background-color: var(--board-light); }
        .dark { background-color: var(--board-dark); }
        
        .piece { width: 36px; height: 36px; border-radius: 50%; box-shadow: 0 3px 5px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: transform 0.2s; pointer-events: none; z-index: 2;}
        .p1 { background-color: var(--p1-color); border: 2px solid #aaa; color: black; }
        .p2 { background-color: var(--p2-color); border: 2px solid #000; color: white; }
        
        .dead { opacity: 0.3; }
        .selected { transform: scale(1.15); box-shadow: 0 0 15px #ffeb3b; border-color: #ffeb3b; }
        
        .highlight { cursor: pointer; }
        .highlight::after { content: ''; width: 18px; height: 18px; background: var(--highlight); border-radius: 50%; position: absolute; z-index: 1;}
        .selectable { cursor: pointer; }
        .selectable:hover { transform: scale(1.08); }

        @media (max-width: 950px) {
            #mainLayout { flex-direction: column; align-items: center; }
            .side-panel { width: 100%; max-width: 400px; height: 250px; }
        }
    </style>
</head>
<body>
    <div id="loginOverlay" class="overlay">
        <div class="modal">
            <h2>Dama Brasileira</h2>
            <input type="text" id="playerName" placeholder="Digite seu nome..." autocomplete="off" onkeypress="if(event.key === 'Enter') joinGame()">
            <button class="btn" onclick="joinGame()">Entrar na Sala</button>
        </div>
    </div>

    <div id="gameOverOverlay" class="overlay hidden">
        <div class="modal">
            <h2>Fim de Jogo!</h2>
            <p id="winnerText" style="font-size: 18px; margin-bottom: 20px;">Vencedor</p>
            <button class="btn" onclick="requestRestart()">Jogar Novamente</button>
        </div>
    </div>

    <div id="mainLayout" class="hidden">
        
        <div class="side-panel">
            <div class="panel-header">HISTÓRICO DE MOVIMENTOS</div>
            <div class="panel-content" id="historyContent">
                </div>
        </div>

        <div id="gameUI">
            <div class="info-panel">
                <div class="player-card" id="cardP1">
                    <div class="score-badge" id="scoreP1">0</div>
                    Brancas<br><b id="nameP1">...</b>
                </div>
                <div class="player-card" id="cardP2">
                    <div class="score-badge" id="scoreP2">0</div>
                    Pretas<br><b id="nameP2">...</b>
                </div>
            </div>
            
            <div id="myRole">Conectando...</div>
            
            <div class="board-layout">
                <div class="row-labels" id="rowLabels"></div>
                <div id="board-wrapper">
                    <div id="board"></div>
                </div>
                <div class="col-labels" id="colLabels"></div>
            </div>

            <button class="btn secondary" onclick="requestSwap()">Trocar Cores (Reiniciar)</button>
        </div>

        <div class="side-panel">
            <div class="panel-header">CHAT DA PARTIDA</div>
            <div class="panel-content" id="chatContent">
                </div>
            <div id="chatInputContainer">
                <input type="text" id="chatInput" placeholder="Envie uma mensagem..." autocomplete="off" onkeypress="if(event.key === 'Enter') sendChat()">
                <button id="chatBtn" onclick="sendChat()">Enviar</button>
            </div>
        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myRole = null;
        let myName = "";
        let currentBoard = [];
        let currentTurn = 1;
        let gameActive = false;
        
        let globalValidActions = [];
        let isMultiJumping = false;
        let selectedCell = null;
        
        // Tracking path notation
        let turnPath = [];
        let turnCaptures = false;

        const myNum = () => myRole === 'p1' ? 1 : 2;
        const isValid = (r, c) => r >= 0 && r < 8 && c >= 0 && c < 8;
        const cloneBoard = (b) => b.map(row => [...row]);
        const getCoordName = (r, c) => String.fromCharCode(65 + c) + (8 - r);

        function joinGame() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) return;
            myName = name;
            socket.emit('join', name);
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainLayout').classList.remove('hidden');
        }

        function sendChat() {
            const input = document.getElementById('chatInput');
            if (input.value.trim()) {
                socket.emit('sendChat', input.value.trim());
                input.value = '';
            }
        }

        socket.on('newChatMessage', (msg) => {
            appendChat(msg);
        });

        function appendChat(msg) {
            const chatBox = document.getElementById('chatContent');
            const div = document.createElement('div');
            
            if (msg.system) {
                div.className = 'chat-msg system';
                div.innerText = msg.text;
            } else {
                div.className = 'chat-msg';
                div.innerHTML = `<b>${msg.sender}:</b> ${msg.text}`;
            }
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function requestSwap() {
            if(confirm("Isso irá trocar as cores e reiniciar a partida. Deseja continuar?")) {
                socket.emit('swapRoles');
            }
        }

        socket.on('role', (role) => {
            myRole = role;
            const roles = {'p1': 'Você joga com as Brancas', 'p2': 'Você joga com as Pretas', 'spectator': 'Você é Espectador (Fila)'};
            document.getElementById('myRole').innerText = roles[role];
        });

        socket.on('playerLeft', () => {
            document.getElementById('gameOverOverlay').classList.add('hidden');
        });

        socket.on('announceWinner', (data) => {
            document.getElementById('winnerText').innerHTML = `<b>${data.winnerName}</b> venceu a partida!`;
            document.getElementById('scoreP1').innerText = data.scores.p1;
            document.getElementById('scoreP2').innerText = data.scores.p2;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        });

        function requestRestart() {
            socket.emit('restartGame');
            document.getElementById('gameOverOverlay').classList.add('hidden');
        }

        socket.on('gameState', (state) => {
            currentBoard = state.board;
            currentTurn = state.currentTurn;
            gameActive = state.gameActive;
            isMultiJumping = false;
            selectedCell = null;
            
            if(gameActive) {
                document.getElementById('gameOverOverlay').classList.add('hidden');
            }
            
            document.getElementById('cardP1').classList.toggle('active-turn', currentTurn === 1);
            document.getElementById('cardP2').classList.toggle('active-turn', currentTurn === 2);
            document.getElementById('nameP1').innerText = state.players.p1 ? state.players.p1.name : 'Aguardando';
            document.getElementById('nameP2').innerText = state.players.p2 ? state.players.p2.name : 'Aguardando';
            document.getElementById('scoreP1').innerText = state.scores.p1;
            document.getElementById('scoreP2').innerText = state.scores.p2;
            
            // Render History
            const historyBox = document.getElementById('historyContent');
            historyBox.innerHTML = '';
            state.moveHistory.forEach((move, index) => {
                const div = document.createElement('div');
                div.className = 'history-move';
                div.innerHTML = `<span>${index + 1}. ${move.player}</span> <span>${move.notation}</span>`;
                historyBox.appendChild(div);
            });
            historyBox.scrollTop = historyBox.scrollHeight;

            // Render Full Chat (For reconnects)
            if(state.chatMessages && state.chatMessages.length > 0 && document.getElementById('chatContent').childElementCount === 0) {
                state.chatMessages.forEach(appendChat);
            }

            if (gameActive && myRole !== 'spectator' && currentTurn === myNum()) {
                globalValidActions = calculateAllValidActions(currentBoard, myNum());
                
                if (globalValidActions.length === 0 && countPieces(currentBoard) > 0) {
                    const opponentRole = myRole === 'p1' ? 'p2' : 'p1';
                    socket.emit('gameOver', opponentRole);
                }
            } else {
                globalValidActions = [];
            }
            renderBoard();
        });

        function countPieces(board) {
            let count = 0;
            board.forEach(row => row.forEach(cell => { if(cell !== 0) count++; }));
            return count;
        }

        function renderBoard() {
            const boardDiv = document.getElementById('board');
            const colLabelsDiv = document.getElementById('colLabels');
            const rowLabelsDiv = document.getElementById('rowLabels');
            
            boardDiv.innerHTML = '';
            colLabelsDiv.innerHTML = '';
            rowLabelsDiv.innerHTML = '';
            
            const isP2 = myRole === 'p2';
            let renderRows = [0,1,2,3,4,5,6,7];
            let renderCols = [0,1,2,3,4,5,6,7];
            
            // Gira o tabuleiro visualmente se o jogador for as pretas (P2)
            if (isP2) {
                renderRows.reverse();
                renderCols.reverse();
            }
            
            // Build Labels
            renderCols.forEach(c => {
                const l = document.createElement('div');
                l.innerText = String.fromCharCode(65 + c);
                colLabelsDiv.appendChild(l);
            });
            renderRows.forEach(r => {
                const l = document.createElement('div');
                l.innerText = 8 - r;
                rowLabelsDiv.appendChild(l);
            });

            const validStartCells = !isMultiJumping ? globalValidActions.map(a => `${a.startR},${a.startC}`) : [];
            const validLandings = selectedCell ? globalValidActions.filter(a => a.startR === selectedCell.r && a.startC === selectedCell.c).map(a => a.path[0]) : [];

            renderRows.forEach(r => {
                renderCols.forEach(c => {
                    const cell = document.createElement('div');
                    const isDark = (r + c) % 2 !== 0;
                    cell.className = `cell ${isDark ? 'dark' : 'light'}`;
                    
                    const isLanding = validLandings.find(l => l && l.r === r && l.c === c);
                    if (isLanding) cell.classList.add('highlight');

                    if (isDark) cell.onclick = () => handleCellClick(r, c, isLanding);

                    let val = currentBoard[r][c];
                    if (val !== 0) {
                        const piece = document.createElement('div');
                        const isDead = val < 0; 
                        const absVal = Math.abs(val);
                        
                        piece.className = `piece ${absVal === 1 || absVal === 3 ? 'p1' : 'p2'}`;
                        if (isDead) piece.classList.add('dead');
                        if (absVal > 2) piece.innerHTML = '👑'; 
                        
                        if (selectedCell && selectedCell.r === r && selectedCell.c === c) piece.classList.add('selected');
                        if (validStartCells.includes(`${r},${c}`)) piece.classList.add('selectable');
                        
                        cell.appendChild(piece);
                    }
                    boardDiv.appendChild(cell);
                });
            });
        }

        function handleCellClick(r, c, isLanding) {
            if (!gameActive || myRole === 'spectator' || currentTurn !== myNum()) return;

            if (!isMultiJumping && globalValidActions.some(a => a.startR === r && a.startC === c)) {
                selectedCell = { r, c };
                turnPath = [{r, c}]; // Inicia o caminho para notação
                turnCaptures = false;
                renderBoard();
            } else if (isLanding && selectedCell) {
                executeActionStep(r, c);
            }
        }

        function executeActionStep(targetR, targetC) {
            let chosenActions = globalValidActions.filter(a => a.startR === selectedCell.r && a.startC === selectedCell.c && a.path[0].r === targetR && a.path[0].c === targetC);
            
            const movingPiece = currentBoard[selectedCell.r][selectedCell.c];
            currentBoard[targetR][targetC] = movingPiece;
            currentBoard[selectedCell.r][selectedCell.c] = 0;

            if (chosenActions[0].captured.length > 0) {
                const cap = chosenActions[0].captured[0];
                currentBoard[cap.r][cap.c] = -Math.abs(currentBoard[cap.r][cap.c]); 
                turnCaptures = true; // Registra que houve captura
            }

            turnPath.push({r: targetR, c: targetC}); // Registra o passo

            chosenActions = chosenActions.map(a => ({
                startR: targetR, startC: targetC,
                path: a.path.slice(1), captured: a.captured.slice(1)
            }));

            if (chosenActions[0].path.length === 0) finalizeTurn(targetR, targetC, movingPiece);
            else {
                isMultiJumping = true;
                selectedCell = { r: targetR, c: targetC };
                globalValidActions = chosenActions;
                renderBoard();
            }
        }

        function finalizeTurn(finalR, finalC, pieceVal) {
            for(let i=0; i<8; i++) {
                for(let j=0; j<8; j++) {
                    if(currentBoard[i][j] < 0) currentBoard[i][j] = 0;
                }
            }
            if (pieceVal === 1 && finalR === 0) currentBoard[finalR][finalC] = 3;
            if (pieceVal === 2 && finalR === 7) currentBoard[finalR][finalC] = 4;

            // Constrói a string de notação (Ex: A3-B4 ou A3xC5)
            const symbol = turnCaptures ? 'x' : '-';
            const notation = turnPath.map(pos => getCoordName(pos.r, pos.c)).join(symbol);
            const playerNameText = myRole === 'p1' ? 'Brancas' : 'Pretas';

            const nextTurn = currentTurn === 1 ? 2 : 1;
            socket.emit('makeMove', { board: currentBoard, nextTurn, notation, playerName: playerNameText });
        }

        function calculateAllValidActions(board, playerNum) {
            let captureActions = []; let simpleActions = []; let maxCaps = 0;

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    let val = board[r][c];
                    if (val === playerNum || val === playerNum + 2) {
                        let paths = findCapturesDFS(r, c, val, board, [], []);
                        if (paths.length > 0) {
                            paths.forEach(p => {
                                let len = p.captured.length;
                                if (len > maxCaps) maxCaps = len;
                                captureActions.push({ startR: r, startC: c, path: p.path, captured: p.captured });
                            });
                        } else if (maxCaps === 0) {
                            let moves = findSimpleMoves(r, c, val, board);
                            moves.forEach(m => simpleActions.push({ startR: r, startC: c, path: [m], captured: [] }));
                        }
                    }
                }
            }
            return maxCaps > 0 ? captureActions.filter(a => a.captured.length === maxCaps) : simpleActions;
        }

        function findCapturesDFS(r, c, piece, boardState, pathSoFar, capturedSoFar) {
            let isDama = piece > 2; let myTeam = piece === 1 || piece === 3 ? 1 : 2;
            let directions = [[-1,-1], [-1,1], [1,-1], [1,1]]; let finalPaths = [];

            for (let [dr, dc] of directions) {
                if (isDama) {
                    let dist = 1, enemyPos = null;
                    while (true) {
                        let nr = r + dr * dist, nc = c + dc * dist;
                        if (!isValid(nr, nc)) break;
                        let cell = boardState[nr][nc];
                        if (cell !== 0) {
                            let cellTeam = (cell === 1 || cell === 3) ? 1 : 2;
                            if (cellTeam !== myTeam && !capturedSoFar.some(cap => cap.r === nr && cap.c === nc)) enemyPos = {r: nr, c: nc};
                            break; 
                        }
                        dist++;
                    }

                    if (enemyPos) {
                        let lDist = dist + 1;
                        while (true) {
                            let lr = r + dr * lDist, lc = c + dc * lDist;
                            if (!isValid(lr, lc) || boardState[lr][lc] !== 0) break; 

                            let newBoard = cloneBoard(boardState);
                            newBoard[r][c] = 0; newBoard[lr][lc] = piece; 
                            let newPath = [...pathSoFar, {r: lr, c: lc}];
                            let newCaps = [...capturedSoFar, enemyPos];

                            let subPaths = findCapturesDFS(lr, lc, piece, newBoard, newPath, newCaps);
                            if (subPaths.length > 0) finalPaths.push(...subPaths);
                            else finalPaths.push({path: newPath, captured: newCaps});
                            
                            lDist++;
                        }
                    }
                } else {
                    let nr = r + dr, nc = c + dc;
                    if (isValid(nr, nc)) {
                        let cell = boardState[nr][nc];
                        let cellTeam = (cell === 1 || cell === 3) ? 1 : 2;
                        if (cell !== 0 && cellTeam !== myTeam && !capturedSoFar.some(cap => cap.r === nr && cap.c === nc)) {
                            let lr = nr + dr, lc = nc + dc;
                            if (isValid(lr, lc) && boardState[lr][lc] === 0) {
                                let newBoard = cloneBoard(boardState);
                                newBoard[r][c] = 0; newBoard[lr][lc] = piece;
                                
                                let newPath = [...pathSoFar, {r: lr, c: lc}];
                                let newCaps = [...capturedSoFar, {r: nr, c: nc}];

                                let subPaths = findCapturesDFS(lr, lc, piece, newBoard, newPath, newCaps);
                                if (subPaths.length > 0) finalPaths.push(...subPaths);
                                else finalPaths.push({path: newPath, captured: newCaps});
                            }
                        }
                    }
                }
            }
            return finalPaths;
        }

        function findSimpleMoves(r, c, piece, boardState) {
            let isDama = piece > 2; let dir = (piece === 1 || piece === 3) ? -1 : 1;
            let directions = isDama ? [[-1,-1], [-1,1], [1,-1], [1,1]] : [[dir,-1], [dir,1]]; 
            let moves = [];

            for (let [dr, dc] of directions) {
                if (isDama) {
                    let dist = 1;
                    while (true) {
                        let nr = r + dr * dist, nc = c + dc * dist;
                        if (!isValid(nr, nc) || boardState[nr][nc] !== 0) break;
                        moves.push({r: nr, c: nc}); dist++;
                    }
                } else {
                    let nr = r + dr, nc = c + dc;
                    if (isValid(nr, nc) && boardState[nr][nc] === 0) moves.push({r: nr, c: nc});
                }
            }
            return moves;
        }
    </script>
</body>
